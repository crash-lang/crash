on: [push, pull_request]

name: Testing

jobs:
  check:
    name: Compiler Cargo check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v2

      - name: Install stable rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Run Cargo check
        uses: actions-rs/cargo@v1
        with:
          command: check

  test:
    name: Compiler Cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
      - uses: actions/checkout@v2

      - name: Install stable rust toolchain
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Run Cargo test in lexer
        uses: actions-rs/cargo@v1
        with:
          command: test